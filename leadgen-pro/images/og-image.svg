<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="LeadGen Pro — Encontre. Engaje. Converta.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="70%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="success" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <circle cx="1080" cy="120" r="180" fill="url(#accent)" opacity="0.18" filter="url(#soft)"/>
  <circle cx="120" cy="560" r="160" fill="url(#success)" opacity="0.10" filter="url(#soft)"/>

  <g transform="translate(80, 90)">
    <rect width="44" height="44" rx="10" fill="url(#accent)"/>
    <text x="22" y="32" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="700" fill="white">LP</text>
    <text x="58" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#f5f5f7">LeadGen</text>
    <text x="186" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#818cf8">Pro</text>
  </g>

  <g transform="translate(80, 200)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600" letter-spacing="0.5" fill="#818cf8">B2B SALES INTELLIGENCE</text>
    <text x="0" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="84" font-weight="800" fill="#f5f5f7" letter-spacing="-2">Encontre.</text>
    <text x="0" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="84" font-weight="800" fill="url(#success)" letter-spacing="-2">Engaje.</text>
    <text x="0" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="84" font-weight="800" fill="#f5f5f7" letter-spacing="-2">Converta.</text>
  </g>

  <g transform="translate(80, 560)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="#a1a1aa">Prospecção B2B · Cadências multicanal · Extensões de navegador</text>
    <text x="0" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#71717a">A partir de R$ 50/mês · leadgen.pro</text>
  </g>

  <g transform="translate(820, 180)" opacity="0.92">
    <rect width="320" height="340" rx="20" fill="#13131a" stroke="rgba(255,255,255,0.08)"/>
    <rect x="20" y="20" width="280" height="40" rx="8" fill="rgba(99,102,241,0.12)"/>
    <circle cx="40" cy="40" r="6" fill="#ef4444"/>
