      <text x="30" y="35" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="white">AM</text>
      <text x="56" y="26" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#f5f5f7">Ana Martins</text>
      <text x="56" y="42" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">Head of Growth · Acme</text>
      <rect x="220" y="20" width="44" height="20" rx="6" fill="rgba(16,185,129,0.18)"/>
      <text x="242" y="34" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" font-weight="600" fill="#10b981">87</text>
