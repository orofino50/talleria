      <circle cx="30" cy="30" r="14" fill="url(#success)"/>
      <text x="30" y="35" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="white">RS</text>
      <text x="56" y="26" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#f5f5f7">Rafael Silva</text>
      <text x="56" y="42" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">CTO · Beta</text>
      <rect x="220" y="20" width="44" height="20" rx="6" fill="rgba(99,102,241,0.18)"/>
      <text x="242" y="34" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" font-weight="600" fill="#818cf8">72</text>
    </g>

    <g transform="translate(20, 224)">
      <rect width="280" height="60" rx="10" fill="rgba(255,255,255,0.04)"/>
      <circle cx="30" cy="30" r="14" fill="#f59e0b"/>
      <text x="30" y="35" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="white">CM</text>
      <text x="56" y="26" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#f5f5f7">Carla Mendes</text>
      <text x="56" y="42" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">VP Sales · Gamma</text>
      <rect x="220" y="20" width="44" height="20" rx="6" fill="rgba(16,185,129,0.18)"/>
      <text x="242" y="34" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" font-weight="600" fill="#10b981">94</text>
    </g>

    <g transform="translate(20, 296)">
      <rect width="280" height="28" rx="8" fill="rgba(16,185,129,0.12)"/>
      <text x="14" y="18" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#10b981">+ 47 leads qualificados hoje</text>
